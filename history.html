<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Browsing History</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://wttr.in https://nominatim.openstreetmap.org https://api.open-meteo.com https://api.rss2json.com https://feeds.reuters.com https://newsapi.org https://openweathermap.org https://api.openweathermap.org; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: https:; object-src 'none'; base-uri 'self'; form-action 'self' https:; frame-ancestors 'none'; upgrade-insecure-requests;">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 28px 18px;
      background: var(--settings-bg, #f8f9fa);
      color: var(--settings-header-color, #202124);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .history-shell {
      max-width: 920px;
      margin: 0 auto;
    }
    .history-container {
      border: 1px solid var(--border-color, #e8eaed);
      border-radius: 14px;
      background: var(--section-bg, #fff);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border-color, #e8eaed);
      background: var(--settings-header-bg, #fff);
    }

    .history-title-block {
      min-width: 0;
    }

    .history-title-left {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 650;
      letter-spacing: -0.01em;
    }

    .history-subtitle {
      margin: 4px 0 0;
      font-size: 0.88rem;
      color: #6f7276;
    }

    .history-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .btn-secondary {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color, #e8eaed);
      background: var(--settings-header-bg, #fff);
      color: var(--settings-header-color, #202124);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background-color 0.14s ease, border-color 0.14s ease;
    }

    .btn-secondary:hover {
      border-color: var(--accent-color-light, #1a73e8);
    }

    .btn-secondary.primary {
      background: var(--accent-color-light, #1a73e8);
      border-color: var(--accent-color-light, #1a73e8);
      color: #fff;
    }

    .btn-secondary.primary:hover {
      background: var(--accent-hover, #1557b0);
      border-color: var(--accent-hover, #1557b0);
    }

    .btn-secondary.danger {
      background: #d93025;
      border-color: #c5221f;
      color: #fff;
    }

    .btn-secondary.danger:hover {
      background: #b8261f;
      border-color: #b8261f;
    }

    .history-list {
      max-height: calc(100vh - 210px);
      overflow-y: auto;
      padding: 8px 12px 14px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--border-color, #e8eaed);
      border-radius: 10px;
      background: var(--section-bg, #fff);
      padding: 10px 12px;
      margin-top: 8px;
      cursor: pointer;
      transition: border-color 0.15s ease, background-color 0.15s ease;
    }

    .history-item:hover {
      border-color: var(--accent-color-light, #1a73e8);
    }

    .history-favicon {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .history-text {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .history-title {
      font-size: 0.95rem;
      color: var(--settings-header-color, #202124);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-meta {
      color: #6f7276;
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .no-history {
      color: #7a7d81;
      text-align: center;
      margin: 24px 0;
      border: 1px dashed var(--border-color, #e8eaed);
      border-radius: 10px;
      padding: 18px 12px;
      background: var(--section-bg, #fff);
    }

    body.theme-dark .history-item,
    body.theme-dark-purple .history-item,
    body.theme-dark-nord .history-item,
    body.theme-dark-forest .history-item,
    body.theme-dark-rose .history-item,
    body.theme-dark .no-history,
    body.theme-dark-purple .no-history,
    body.theme-dark-nord .no-history,
    body.theme-dark-forest .no-history,
    body.theme-dark-rose .no-history {
      background: rgba(0, 0, 0, 0.12);
      border-color: #40454f;
    }

    body.theme-dark .history-title,
    body.theme-dark-purple .history-title,
    body.theme-dark-nord .history-title,
    body.theme-dark-forest .history-title,
    body.theme-dark-rose .history-title {
      color: #e7eaf0;
    }

    body.theme-dark .history-meta,
    body.theme-dark-purple .history-meta,
    body.theme-dark-nord .history-meta,
    body.theme-dark-forest .history-meta,
    body.theme-dark-rose .history-meta,
    body.theme-dark .history-subtitle,
    body.theme-dark-purple .history-subtitle,
    body.theme-dark-nord .history-subtitle,
    body.theme-dark-forest .history-subtitle,
    body.theme-dark-rose .history-subtitle,
    body.theme-dark .no-history,
    body.theme-dark-purple .no-history,
    body.theme-dark-nord .no-history,
    body.theme-dark-forest .no-history,
    body.theme-dark-rose .no-history {
      color: #aeb4bf;
    }

    @media (max-width: 700px) {
      body { padding: 14px; }
      .history-header { flex-direction: column; align-items: stretch; }
      .history-controls { width: 100%; }
      .history-controls button { flex: 1; }
    }
  </style>
</head>
<body>
  <div class="history-shell">
    <div class="history-container">
      <div class="history-header">
        <div class="history-title-block">
          <h1 class="history-title-left">Browsing History</h1>
          <p class="history-subtitle">Recent pages from this browser profile.</p>
        </div>
        <div class="history-controls">
          <button id="refresh-history-btn" class="btn-secondary primary">Refresh</button>
          <button id="clear-history-btn" class="btn-secondary danger">Clear</button>
        </div>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>
  </div>
  <script src="history.js"></script>
</body>
</html>
