<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>Suggestions Overlay</title>
  <style>
    html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; font-family: sans-serif; }
    .overlay-shell {
      margin: 0;
      border: 1px solid #d0d0d0;
      border-radius: 12px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.14);
      background: #ffffff;
      padding: 4px;
      max-height: 100vh;
      box-sizing: border-box;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(32,33,36,0.24) transparent;
    }
    .overlay-shell::-webkit-scrollbar {
      width: 12px;
      background: transparent;
    }
    .overlay-shell::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.04);
      border-radius: 999px;
    }
    .overlay-shell::-webkit-scrollbar-thumb {
      background: rgba(32, 33, 36, 0.32);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    .overlay-shell::-webkit-scrollbar-thumb:hover {
      background: rgba(32, 33, 36, 0.44);
    }
    .item {
      width: 100%;
      display: grid;
      grid-template-columns: 66px 1fr;
      grid-template-rows: auto auto;
      gap: 1px 8px;
      align-items: center;
      text-align: left;
      border: none;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      padding: 7px 8px;
      color: inherit;
    }
    .item.active, .item:hover { background: rgba(66, 133, 244, 0.12); }
    .source { grid-row: 1 / span 2; font-size: 11px; text-transform: capitalize; color: #5f6368; }
    .main { font-size: 13px; color: #202124; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta { font-size: 12px; color: #6f7276; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    body.theme-dark .overlay-shell,
    body.theme-dark-purple .overlay-shell,
    body.theme-dark-nord .overlay-shell,
    body.theme-dark-forest .overlay-shell,
    body.theme-dark-rose .overlay-shell {
      background: #202124;
      border-color: #3c4043;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.4);
    }
    body.theme-dark .item.active,
    body.theme-dark .item:hover,
    body.theme-dark-purple .item.active,
    body.theme-dark-purple .item:hover,
    body.theme-dark-nord .item.active,
    body.theme-dark-nord .item:hover,
    body.theme-dark-forest .item.active,
    body.theme-dark-forest .item:hover,
    body.theme-dark-rose .item.active,
    body.theme-dark-rose .item:hover { background: rgba(255, 255, 255, 0.09); }
    body.theme-dark .source,
    body.theme-dark-purple .source,
    body.theme-dark-nord .source,
    body.theme-dark-forest .source,
    body.theme-dark-rose .source { color: #a9aaae; }
    body.theme-dark .main,
    body.theme-dark-purple .main,
    body.theme-dark-nord .main,
    body.theme-dark-forest .main,
    body.theme-dark-rose .main { color: #f1f3f4; }
    body.theme-dark .meta,
    body.theme-dark-purple .meta,
    body.theme-dark-nord .meta,
    body.theme-dark-forest .meta,
    body.theme-dark-rose .meta { color: #bdc1c6; }

    body.theme-dark .overlay-shell::-webkit-scrollbar-track,
    body.theme-dark-purple .overlay-shell::-webkit-scrollbar-track,
    body.theme-dark-nord .overlay-shell::-webkit-scrollbar-track,
    body.theme-dark-forest .overlay-shell::-webkit-scrollbar-track,
    body.theme-dark-rose .overlay-shell::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.08);
    }

    body.theme-dark .overlay-shell::-webkit-scrollbar-thumb,
    body.theme-dark-purple .overlay-shell::-webkit-scrollbar-thumb,
    body.theme-dark-nord .overlay-shell::-webkit-scrollbar-thumb,
    body.theme-dark-forest .overlay-shell::-webkit-scrollbar-thumb,
    body.theme-dark-rose .overlay-shell::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.24);
      border-color: transparent;
    }

    body.theme-dark .overlay-shell::-webkit-scrollbar-thumb:hover,
    body.theme-dark-purple .overlay-shell::-webkit-scrollbar-thumb:hover,
    body.theme-dark-nord .overlay-shell::-webkit-scrollbar-thumb:hover,
    body.theme-dark-forest .overlay-shell::-webkit-scrollbar-thumb:hover,
    body.theme-dark-rose .overlay-shell::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.36);
    }
  </style>
</head>
<body>
  <div id="overlay-shell" class="overlay-shell"></div>
  <script src="suggestions-overlay.js"></script>
</body>
</html>
